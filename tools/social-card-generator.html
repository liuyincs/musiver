<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Musiver Social Card Generator</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Noto+Sans+SC:wght@300;500;700&display=swap");

      :root {
        --card-width: 1200px;
        --card-height: 675px;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: #000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: "Outfit", "Noto Sans SC", sans-serif;
      }

      .controls {
        margin-bottom: 20px;
        text-align: center;
        color: #fff;
        width: min(100%, 1280px);
      }

      .control-panel {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
      }

      .field {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.86);
      }

      .field input {
        width: 92px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.24);
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        font-size: 14px;
        padding: 8px 10px;
        font-family: inherit;
      }

      button {
        padding: 12px 24px;
        font-size: 16px;
        cursor: pointer;
        background: #6d28d9;
        color: white;
        border: none;
        border-radius: 8px;
        font-family: inherit;
        transition:
          background 0.3s,
          opacity 0.3s;
      }

      button:hover:not(:disabled) {
        background: #5b21b6;
      }

      button:disabled {
        background: #4b5563;
        cursor: not-allowed;
        opacity: 0.7;
      }

      .error-prompt {
        display: none;
        color: #ef4444;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.2);
        padding: 12px 24px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 14px;
        font-weight: 500;
        text-align: center;
      }

      .card-container {
        width: var(--card-width);
        height: var(--card-height);
        box-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
      }

      .card {
        width: var(--card-width);
        height: var(--card-height);
        background: radial-gradient(
          circle at 50% 50%,
          #1a1a1a 0%,
          #000000 100%
        );
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
      }

      /* Abstract Background Elements */
      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.5;
        z-index: 1;
      }

      .orb-1 {
        width: 600px;
        height: 600px;
        background: #7c3aed; /* Violet */
        top: -200px;
        left: -100px;
      }

      .orb-2 {
        width: 500px;
        height: 500px;
        background: #0ea5e9; /* Sky Blue */
        bottom: -150px;
        right: -100px;
      }

      .orb-3 {
        width: 300px;
        height: 300px;
        background: #db2777; /* Pink */
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        opacity: 0.3;
      }

      /* Grid Overlay */
      .grid {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        background-size: 50px 50px;
        z-index: 2;
        mask-image: radial-gradient(
          circle at center,
          black 40%,
          transparent 100%
        );
        -webkit-mask-image: radial-gradient(
          circle at center,
          black 40%,
          transparent 100%
        );
      }

      .content {
        position: relative;
        z-index: 10;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      .logo-container {
        width: 160px;
        height: 160px;
        margin-bottom: 30px;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 40px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }

      .logo {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      h1 {
        font-size: 7rem;
        margin: 0;
        line-height: 1.1;
        font-weight: 800;
        background: linear-gradient(to right, #ffffff, #94a3b8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -2px;
        text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      .card p {
        font-size: 2.2rem;
        margin-top: 10px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.8);
        letter-spacing: 4px;
        text-transform: uppercase;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
  </head>
  <body>
    <div class="controls">
      <div class="control-panel">
        <label class="field"
          >宽度
          <input id="widthInput" type="number" min="200" step="10" value="1200"
        /></label>
        <label class="field"
          >高度
          <input id="heightInput" type="number" min="200" step="10" value="675"
        /></label>
        <label class="field"
          >压缩质量
          <input
            id="qualityInput"
            type="number"
            min="0.1"
            max="1"
            step="0.01"
            value="0.88"
        /></label>
        <button id="downloadBtn" onclick="downloadCard()">
          下载社交卡片（JPG）
        </button>
      </div>
    </div>

    <div id="errorPrompt" class="error-prompt"></div>

          <p>Cross-platform NAS Music Player</p>

    <script>
      function validateInputs() {
        const widthInput = document.getElementById("widthInput");
        const heightInput = document.getElementById("heightInput");
        const qualityInput = document.getElementById("qualityInput");
        const errorPrompt = document.getElementById("errorPrompt");
        const downloadBtn = document.getElementById("downloadBtn");
        const cardContainer = document.getElementById("cardContainer");

        const width = Number(widthInput.value);
        const height = Number(heightInput.value);
        const quality = Number(qualityInput.value);

        let isValid = true;
        let errorMessage = "";

        if (
          !widthInput.value ||
          !heightInput.value ||
          isNaN(width) ||
          isNaN(height)
        ) {
          isValid = false;
          errorMessage = "请输入有效的宽度和高度数字";
        } else if (
          width < 200 ||
          width > 10000 ||
          height < 200 ||
          height > 10000
        ) {
          isValid = false;
          errorMessage = "宽度和高度必须在 200 到 10000 之间";
        } else if (
          !qualityInput.value ||
          isNaN(quality) ||
          quality < 0.1 ||
          quality > 1
        ) {
          isValid = false;
          errorMessage = "压缩质量必须在 0.1 到 1 之间";
        }

        if (!isValid) {
          errorPrompt.textContent = errorMessage;
          errorPrompt.style.display = "block";
          downloadBtn.disabled = true;
          cardContainer.style.opacity = "0.2";
          cardContainer.style.pointerEvents = "none";
          return null;
        }

        errorPrompt.style.display = "none";
        downloadBtn.disabled = false;
        cardContainer.style.opacity = "1";
        cardContainer.style.pointerEvents = "auto";

        return { width, height, quality };
      }

      function applyCardSize() {
        const options = validateInputs();
        if (!options) return;

        const { width, height } = options;
        const root = document.documentElement;
        root.style.setProperty("--card-width", `${width}px`);
        root.style.setProperty("--card-height", `${height}px`);
      }

      async function waitForImages(container) {
        const images = Array.from(container.querySelectorAll("img"));
        await Promise.all(
          images.map((img) => {
            if (img.complete) return Promise.resolve();
            return new Promise((resolve) => {
              img.addEventListener("load", resolve, { once: true });
              img.addEventListener("error", resolve, { once: true });
            });
          }),
        );
      }

      async function downloadCard() {
        const options = validateInputs();
        if (!options) return;

        const card = document.getElementById("capture");
        applyCardSize();
        const { width, height, quality } = options;

        if (document.fonts && document.fonts.ready) {
          await document.fonts.ready;
        }
        await waitForImages(card);
        await new Promise((resolve) => requestAnimationFrame(resolve));

        const canvas = await htmlToImage.toCanvas(card, {
          pixelRatio: 2,
          width,
          height,
          canvasWidth: width * 2,
          canvasHeight: height * 2,
          cacheBust: true,
        });

        const compressedDataUrl = canvas.toDataURL("image/jpeg", quality);
        const link = document.createElement("a");
        link.download = `musiver-social-card-${width}x${height}.jpg`;
        link.href = compressedDataUrl;
        link.click();
      }

      applyCardSize();
      document
        .getElementById("widthInput")
        .addEventListener("input", applyCardSize);
      document
        .getElementById("heightInput")
        .addEventListener("input", applyCardSize);
    </script>
