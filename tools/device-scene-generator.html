<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Musiver Device Scene Generator</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@500;700&display=swap");

      :root {
        --card-width: 400px;
        --card-height: 260px;
        --scene-gap-x: 0px;
        --scene-gap-y: 0px;
        --device-scale: 1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: #222;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: "Manrope", sans-serif;
      }

      .controls {
        margin-bottom: 20px;
        text-align: center;
        color: #fff;
        width: min(100%, 1280px);
      }

      .control-panel {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
      }

      .field {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.86);
      }

      .field input {
        width: 92px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.24);
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        font-size: 14px;
        padding: 8px 10px;
        font-family: inherit;
      }

      button {
        padding: 12px 24px;
        font-size: 16px;
        cursor: pointer;
        background: #6d28d9;
        color: white;
        border: none;
        border-radius: 8px;
        font-family: inherit;
        transition:
          background 0.3s,
          opacity 0.3s;
      }

      button:hover:not(:disabled) {
        background: #5b21b6;
      }

      button:disabled {
        background: #4b5563;
        cursor: not-allowed;
        opacity: 0.7;
      }

      .error-prompt {
        display: none;
        color: #ef4444;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.2);
        padding: 12px 24px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 14px;
        font-weight: 500;
        text-align: center;
      }

      .card-container {
        width: var(--card-width);
        height: var(--card-height);
        background-image:
          linear-gradient(45deg, #333 25%, transparent 25%),
          linear-gradient(-45deg, #333 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #333 75%),
          linear-gradient(-45deg, transparent 75%, #333 75%);
        background-size: 20px 20px;
        background-position:
          0 0,
          0 10px,
          10px -10px,
          -10px 0px;
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
      }

      #capture {
        width: var(--card-width);
        height: var(--card-height);
        background: transparent;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      /* Devices on right — studio arrangement */
      .heroDevices {
        position: relative;
        height: 100%;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .deviceScene {
        position: relative;
        width: 100%;
        height: 100%;
        transform-origin: center;
      }

      .deviceLayout {
        position: absolute;
        top: var(--scene-gap-y);
        right: var(--scene-gap-x);
        bottom: var(--scene-gap-y);
        left: var(--scene-gap-x);
      }

      /* Common Device Styles */
      .deviceFrame {
        position: absolute;
        background: #1a1a1a;
        border-radius: 12px;
        overflow: hidden;
      }

      .deviceScreen {
        background: #000;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.5);
        font-size: 0.8rem;
        font-weight: 500;
        position: relative;
        overflow: hidden;
      }

      /* Device: TV (Back, Center) */
      .tvDevice {
        width: 80%;
        aspect-ratio: 16/11;
        top: 0;
        left: 50%;
        transform: translateX(-50%) scale(var(--device-scale));
        transform-origin: top center;
        z-index: 1;
        border-radius: 8px;
        border: 4px solid #2a2a2a; /* Bezel */
      }
      .tvDevice::after {
        /* TV Stand hint */
        content: "";
        position: absolute;
        bottom: -20px;
        left: 50%;
        transform: translateX(-50%);
        width: 30%;
        height: 20px;
        background: linear-gradient(to bottom, #2a2a2a, #1a1a1a);
        z-index: -1;
        border-radius: 0 0 8px 8px;
      }

      /* Device: Laptop (Right, Middle) */
      .laptopDevice {
        position: absolute;
        width: 60%;
        bottom: 0;
        right: 0;
        transform: scale(var(--device-scale));
        transform-origin: bottom right;
        z-index: 2;
      }

      .laptopLid {
        position: relative;
        width: 100%;
        aspect-ratio: 16/10;
        background: #1a1a1a;
        padding: 10px 10px 25px 10px; /* Bezel + Bottom chin */
        border-radius: 8px 8px 0 0; /* Flat bottom */
        z-index: 2;
      }

      .laptopScreen {
        background: #000;
        width: 100%;
        height: 100%;
        border-radius: 4px;
        overflow: hidden;
        position: relative;
      }

      /* Laptop Base (Frontal View - just the edge) */
      .laptopBase {
        position: relative;
        width: 120%;
        height: 10px; /* Ultra thin profile */
        background: #2a2a2a;
        left: -10%;
        margin-top: -3px; /* Connect to lid */
        border-radius: 0 0 12px 12px; /* Rounded bottom corners */
        z-index: 1;
      }

      .laptopBase::before {
        content: "";
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 15%;
        height: 3px;
        background: #1a1a1a; /* Match lid color for the cutout illusion */
        border-radius: 0 0 4px 4px;
      }

      .laptopTrackpad {
        display: none;
      }

      /* Device: Phone (Far Left, Front) */
      .phoneDevice {
        position: absolute;
        width: 20%;
        aspect-ratio: 8/17;
        left: 0;
        bottom: 0;
        transform: scale(var(--device-scale));
        transform-origin: bottom left;
        z-index: 4;
        border-radius: 14px;
        border: 4px solid #1a1a1a; /* Bezel */
      }
      .phoneDevice::before {
        /* Dynamic Island / Notch */
        content: "";
        position: absolute;
        top: 6px;
        left: 50%;
        transform: translateX(-50%);
        width: 25%;
        height: 8px;
        background: #000;
        border-radius: 10px;
        z-index: 10;
      }

      /* Placeholder Content Styles */
      .placeholderArt {
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.8;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
  </head>
  <body>
    <div class="controls">
      <div class="control-panel">
        <label class="field"
          >宽度
          <input id="widthInput" type="number" min="200" step="10" value="400"
        /></label>
        <label class="field"
          >高度
          <input id="heightInput" type="number" min="200" step="10" value="240"
        /></label>
        <button id="downloadBtn" onclick="downloadCard()">
          下载设备区域图（透明 PNG）
        </button>
      </div>
    </div>

    <div id="errorPrompt" class="error-prompt"></div>

    <div class="card-container" id="cardContainer">
      <div id="capture">
        <div class="heroDevices">
          <div class="deviceScene">
            <div class="deviceLayout">
              <!-- TV (Back) -->
              <div class="deviceFrame tvDevice">
                <div class="deviceScreen">
                  <img
                    src="../static/img/devices/tv-screen.jpg"
                    alt="TV Interface"
                    class="placeholderArt" />
                </div>
              </div>

              <!-- Laptop (Middle Right) -->
              <div class="laptopDevice">
                <div class="deviceFrame laptopLid">
                  <div class="laptopScreen">
                    <div class="deviceScreen">
                      <img
                        src="../static/img/devices/laptop-screen.jpg"
                        alt="Laptop Interface"
                        class="placeholderArt" />
                    </div>
                  </div>
                </div>
                <div class="laptopBase">
                  <div class="laptopTrackpad"></div>
                </div>
              </div>

              <!-- Phone (Front Far Left) -->
              <div class="deviceFrame phoneDevice">
                <div class="deviceScreen">
                  <img
                    src="../static/img/devices/phone-screen.jpg"
                    alt="Phone Interface"
                    class="placeholderArt" />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      function validateInputs() {
        const widthInput = document.getElementById("widthInput");
        const heightInput = document.getElementById("heightInput");
        const errorPrompt = document.getElementById("errorPrompt");
        const downloadBtn = document.getElementById("downloadBtn");
        const cardContainer = document.getElementById("cardContainer");

        const width = Number(widthInput.value);
        const height = Number(heightInput.value);

        let isValid = true;
        let errorMessage = "";

        if (
          !widthInput.value ||
          !heightInput.value ||
          isNaN(width) ||
          isNaN(height)
        ) {
          isValid = false;
          errorMessage = "请输入有效的宽度和高度数字";
        } else if (
          width < 200 ||
          width > 10000 ||
          height < 200 ||
          height > 10000
        ) {
          isValid = false;
          errorMessage = "宽度和高度必须在 200 到 10000 之间";
        }

        if (!isValid) {
          errorPrompt.textContent = errorMessage;
          errorPrompt.style.display = "block";
          downloadBtn.disabled = true;
          cardContainer.style.opacity = "0.2";
          cardContainer.style.pointerEvents = "none";
          return null;
        }

        errorPrompt.style.display = "none";
        downloadBtn.disabled = false;
        cardContainer.style.opacity = "1";
        cardContainer.style.pointerEvents = "auto";

        return { width, height };
      }

      function applyCardSize() {
        const options = validateInputs();
        if (!options) return;

        const { width, height } = options;
        const root = document.documentElement;
        root.style.setProperty("--card-width", `${width}px`);
        root.style.setProperty("--card-height", `${height}px`);

        const scene = document.querySelector(".deviceScene");
        scene.style.transform = "none";
        alignLaptopToKeyboardRight();
      }

      function alignLaptopToKeyboardRight() {
        const layout = document.querySelector(".deviceLayout");
        const laptop = document.querySelector(".laptopDevice");
        const base = document.querySelector(".laptopBase");
        if (!layout || !laptop || !base) return;

        laptop.style.right = "0px";

        const layoutRect = layout.getBoundingClientRect();
        const baseRect = base.getBoundingClientRect();
        const overflowRight = Math.max(0, baseRect.right - layoutRect.right);
        laptop.style.right = `${overflowRight}px`;
      }

      async function waitForImages(container) {
        const images = Array.from(container.querySelectorAll("img"));
        await Promise.all(
          images.map((img) => {
            if (img.complete) return Promise.resolve();
            return new Promise((resolve) => {
              img.addEventListener("load", resolve, { once: true });
              img.addEventListener("error", resolve, { once: true });
            });
          }),
        );
      }

      async function downloadCard() {
        const options = validateInputs();
        if (!options) return;

        const card = document.getElementById("capture");
        applyCardSize();
        const { width, height } = options;

        if (document.fonts && document.fonts.ready) {
          await document.fonts.ready;
        }
        await waitForImages(card);
        await new Promise((resolve) => requestAnimationFrame(resolve));

        const canvas = await htmlToImage.toCanvas(card, {
          pixelRatio: 2,
          width,
          height,
          canvasWidth: width * 2,
          canvasHeight: height * 2,
          backgroundColor: null,
          cacheBust: true,
        });

        const dataUrl = canvas.toDataURL("image/png");
        const link = document.createElement("a");
        link.download = `musiver-devices-${width}x${height}.png`;
        link.href = dataUrl;
        link.click();
      }

      applyCardSize();
      document
        .getElementById("widthInput")
        .addEventListener("input", applyCardSize);
      document
        .getElementById("heightInput")
        .addEventListener("input", applyCardSize);
    </script>
  </body>
</html>
